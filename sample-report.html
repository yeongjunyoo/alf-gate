<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF-GATE 리포트</title>
<style>
  :root {
    --indigo: #4f46e5;
    --indigo-dark: #4338ca;
    --indigo-soft: #eef2ff;
    --bg: #f5f6fa;
    --card: #ffffff;
    --line: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --green: #059669;
    --green-soft: #ecfdf5;
    --amber: #d97706;
    --amber-soft: #fffbeb;
    --red: #dc2626;
    --red-soft: #fef2f2;
    --orange: #ea580c;
    --orange-soft: #fff7ed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }

  /* 헤더 */
  header { margin-bottom: 24px; }
  .brand-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .brand {
    font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--indigo-dark);
  }
  .badge-synthetic {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--amber); background: var(--amber-soft);
    border: 1px solid #fcd34d; border-radius: 6px; padding: 3px 8px;
  }
  .tagline { font-size: 15px; color: var(--text); margin-top: 6px; }
  .store-line { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* 탭 */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--line); margin-bottom: 28px; }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    font: inherit; font-size: 15px; font-weight: 600; color: var(--muted);
    padding: 12px 20px; margin-bottom: -2px;
    border-bottom: 2px solid transparent;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--indigo); border-bottom-color: var(--indigo); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 카드, 섹션 */
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 24px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  }
  .section-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .section-sub { font-size: 13px; color: var(--muted); margin-top: -10px; margin-bottom: 16px; }
  .stack > * + * { margin-top: 16px; }

  /* 커버리지 히어로 */
  .coverage-hero { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .ring-box { position: relative; width: 140px; height: 140px; flex: none; }
  .ring-box svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--line); }
  .ring-fg { stroke: var(--indigo); transition: stroke-dashoffset 0.8s ease; }
  .ring-label {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct { font-size: 30px; font-weight: 800; color: var(--indigo-dark); }
  .ring-cap { font-size: 11px; color: var(--muted); }
  .coverage-meta { flex: 1; min-width: 220px; }
  .coverage-meta .big { font-size: 22px; font-weight: 700; }
  .coverage-meta .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* 클러스터 바 */
  .cluster-row { display: grid; grid-template-columns: 180px 1fr 56px; align-items: center; gap: 12px; padding: 8px 0; }
  .cluster-name { font-size: 13px; font-weight: 600; }
  .bar-track { background: var(--indigo-soft); border-radius: 6px; height: 14px; overflow: hidden; }
  .bar-fill { background: var(--indigo); height: 100%; border-radius: 6px; }
  .cluster-count { font-size: 13px; color: var(--muted); text-align: right; }

  /* 미커버 카드 */
  .uncovered-card {
    background: var(--amber-soft); border: 1px solid #fcd34d;
    border-radius: 10px; padding: 16px 18px;
  }
  .uncovered-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .uncovered-name { font-size: 14px; font-weight: 700; color: #92400e; }
  .uncovered-count { font-size: 12px; color: var(--amber); font-weight: 600; }
  .uncovered-q { font-size: 13px; color: #78350f; margin-top: 6px; font-style: italic; }
  .uncovered-reason { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .guide-tag {
    display: inline-block; font-size: 11px; font-weight: 700; color: var(--amber);
    border: 1px solid #fcd34d; border-radius: 999px; padding: 2px 10px; margin-top: 10px;
    background: #fff;
  }

  /* 케이스 그리드 */
  .case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .case-card { display: flex; flex-direction: column; gap: 10px; }
  .case-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .case-id { font-size: 12px; font-weight: 800; color: var(--indigo); background: var(--indigo-soft); border-radius: 6px; padding: 3px 8px; }
  .case-cluster { font-size: 12px; color: var(--muted); }
  .case-goal { font-size: 14px; font-weight: 700; }
  .case-criteria { font-size: 13px; color: var(--muted); }
  .label-mini { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12px; background: #f3f4f6; color: var(--text);
    border-radius: 999px; padding: 3px 10px;
  }
  .chip.persona-name { background: var(--indigo-soft); color: var(--indigo-dark); font-weight: 700; }
  .chip.compat { background: var(--green-soft); color: var(--green); font-weight: 700; }
  .src-ids { font-size: 11px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* 요약 타일 */
  .tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .tile { text-align: center; padding: 18px 12px; }
  .tile .num { font-size: 28px; font-weight: 800; }
  .tile .cap { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .num.indigo { color: var(--indigo-dark); }
  .num.green { color: var(--green); }
  .num.amber { color: var(--amber); }
  .num.red { color: var(--red); }

  /* 결과 행 */
  .result-row { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; }
  .result-head {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    cursor: pointer; user-select: none;
  }
  .result-head:hover { background: #fafafa; }
  .result-head .arrow { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .result-row.open .result-head .arrow { transform: rotate(90deg); }
  .outcome-chip { font-size: 12px; font-weight: 700; border-radius: 999px; padding: 3px 12px; }
  .outcome-pass { background: var(--green-soft); color: var(--green); }
  .outcome-warn { background: var(--amber-soft); color: var(--amber); }
  .outcome-fail { background: var(--red-soft); color: var(--red); }
  .result-cx { margin-left: auto; font-size: 13px; color: var(--muted); }
  .result-body { display: none; border-top: 1px solid var(--line); padding: 18px; }
  .result-row.open .result-body { display: block; }
  .judge-reason { font-size: 13px; color: var(--text); background: #f9fafb; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }

  /* CX 통과, 감사 실패 배지 */
  .cx-audit-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; color: var(--red);
    background: var(--red-soft); border: 1px solid #fca5a5;
    border-radius: 999px; padding: 4px 12px; margin-bottom: 14px;
  }

  /* 채팅 버블 */
  .chat { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
  .bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 13px; }
  .bubble.customer { align-self: flex-start; background: #f3f4f6; border-bottom-left-radius: 4px; }
  .bubble.agent { align-self: flex-end; background: var(--indigo); color: #fff; border-bottom-right-radius: 4px; }
  .bubble-role { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .bubble-role.right { text-align: right; }

  /* 위반 카드 */
  .violation-card {
    background: var(--red-soft); border: 1px solid #fca5a5;
    border-radius: 10px; padding: 16px 18px; margin-top: 14px;
  }
  .violation-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .violation-type { font-size: 13px; font-weight: 800; color: var(--red); }
  .severity-chip { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 10px; }
  .severity-high { background: var(--red); color: #fff; }
  .severity-medium { background: var(--amber); color: #fff; }
  .severity-low { background: #9ca3af; color: #fff; }
  .quote-block { font-size: 13px; margin-top: 8px; }
  .quote-block .q-label { font-size: 11px; font-weight: 700; color: var(--muted); }
  .quote-block .q-text { margin-top: 2px; padding-left: 10px; border-left: 3px solid #fca5a5; color: #7f1d1d; }
  .quote-block .q-text.truth { border-left-color: #9ca3af; color: var(--text); }
  .violation-evidence { font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* 델타, 비교 */
  .delta-num { font-size: 44px; font-weight: 800; }
  .delta-num.neg { color: var(--red); }
  .delta-num.pos { color: var(--green); }
  .delta-cap { font-size: 13px; color: var(--muted); }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 640px) { .compare-grid { grid-template-columns: 1fr; } }
  .compare-col h4 { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
  .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed var(--line); }
  .kv:last-child { border-bottom: none; }
  .kv .v { font-weight: 700; }

  /* 깨진 케이스 */
  .broken-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .broken-row:last-child { border-bottom: none; }
  .state-flow { display: flex; align-items: center; gap: 6px; flex: none; }
  .state-chip { font-size: 12px; font-weight: 700; border-radius: 999px; padding: 2px 10px; }
  .broken-reason { font-size: 13px; color: var(--muted); flex: 1; min-width: 200px; }

  /* 추천 배너 */
  .rec-banner {
    border-radius: 12px; padding: 28px; text-align: center;
  }
  .rec-banner.hold { background: var(--orange-soft); border: 2px solid var(--orange); }
  .rec-banner.go { background: var(--green-soft); border: 2px solid var(--green); }
  .rec-label { font-size: 22px; font-weight: 800; }
  .rec-banner.hold .rec-label { color: var(--orange); }
  .rec-banner.go .rec-label { color: var(--green); }
  .rec-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .rec-actions { display: flex; gap: 12px; justify-content: center; margin-top: 18px; }
  .btn {
    font: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    border-radius: 8px; padding: 10px 22px; border: 1px solid transparent;
  }
  .btn-approve { background: var(--indigo); color: #fff; }
  .btn-approve:hover { background: var(--indigo-dark); }
  .btn-hold { background: #fff; color: var(--text); border-color: var(--line); }
  .btn-hold:hover { background: #f9fafb; }

  /* 토스트 */
  #toast {
    position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px);
    background: #111827; color: #fff; font-size: 13px; font-weight: 600;
    padding: 12px 20px; border-radius: 10px; opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s; z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty-note { font-size: 13px; color: var(--muted); padding: 18px; text-align: center; }
</style>
</head>

    var el = document.getElementById("tab3");
    var html = "";
    var rec = regression.recommendation === "go" ? "go" : "hold";

    /* 변경 내용 */
    var change = regression.change || {};
    html += '<div class="card"><div class="section-title">변경 내용</div>'
      + '<div class="kv"><span>설명</span><span class="v">' + esc(change.description || "-") + "</span></div>"
      + '<div class="kv"><span>변경자</span><span class="v">' + esc(change.editedBy || "-") + "</span></div>"
      + '<div class="kv"><span>시각</span><span class="v">' + esc(change.at || "-") + "</span></div></div>";

    /* 델타 해결률 */
    var delta = num(regression.deltaResolutionRate, 0);
    var deltaPct = (delta * 100).toFixed(1);
    var deltaCls = delta < 0 ? "neg" : "pos";
    var deltaSign = delta > 0 ? "+" : "";
    html += '<div class="card" style="margin-top:16px; text-align:center">'
      + '<div class="delta-num ' + deltaCls + '">' + deltaSign + deltaPct + '%p</div>'
      + '<div class="delta-cap">델타 해결률 (변경 후 − 변경 전)</div></div>';

    /* baseline vs candidate */
    var base = runs[0] || {}, cand = runs[1] || {};
    var bs = base.summary || {}, cs = cand.summary || {};
    function summaryKv(s) {
      return '<div class="kv"><span>해결률</span><span class="v">' + Math.round(num(s.resolutionRate, 0) * 100) + '%</span></div>'
        + '<div class="kv"><span>통과</span><span class="v">' + esc(num(s.passCount, 0)) + "</span></div>"
        + '<div class="kv"><span>주의</span><span class="v">' + esc(num(s.warnCount, 0)) + "</span></div>"
        + '<div class="kv"><span>실패</span><span class="v">' + esc(num(s.failCount, 0)) + "</span></div>"
        + '<div class="kv"><span>약속 위반</span><span class="v">' + esc(num(s.violationCount, 0)) + "</span></div>";
    }
    html += '<div class="card" style="margin-top:16px"><div class="section-title">실행 비교</div>'
      + '<div class="compare-grid">'
      + '<div class="compare-col"><h4>' + esc(base.label || "baseline") + "</h4>" + summaryKv(bs) + "</div>"
      + '<div class="compare-col"><h4>' + esc(cand.label || "candidate") + "</h4>" + summaryKv(cs) + "</div>"
      + "</div></div>";

    /* 깨진 케이스 */
    var broken = arr(regression.brokenCases);
    html += '<div class="card" style="margin-top:16px"><div class="section-title">깨진 케이스</div>';
    if (!broken.length) {
      html += '<div class="empty-note">깨진 케이스가 없습니다.</div>';
    } else {
      broken.forEach(function (b) {
        html += '<div class="broken-row"><span class="case-id">' + esc(b.caseId) + "</span>"
          + '<span class="state-flow">'
          + '<span class="state-chip outcome-' + esc(b.before || "pass") + '">' + esc(OUTCOME_LABEL[b.before] || b.before || "-") + "</span>"
          + "<span>→</span>"
          + '<span class="state-chip outcome-' + esc(b.after || "fail") + '">' + esc(OUTCOME_LABEL[b.after] || b.after || "-") + "</span>"
          + "</span>"
          + '<span class="broken-reason">' + esc(b.reason) + "</span></div>";
      });
    }
    html += "</div>";

    /* 추천 배너 */
    html += '<div class="rec-banner ' + rec + '" style="margin-top:16px">'
      + '<div class="rec-label">' + esc(regression.recommendationLabel || (rec === "hold" ? "배포 보류" : "배포 가능")) + "</div>"
      + '<div class="rec-sub">모의 환경입니다. 버튼은 실제 배포에 영향을 주지 않습니다.</div>'
      + '<div class="rec-actions">'
      + '<button class="btn btn-approve" id="btnApprove">배포 승인</button>'
      + '<button class="btn btn-hold" id="btnHold">보류 유지</button>'
      + "</div></div>";

    el.innerHTML = html;

    document.getElementById("btnApprove").addEventListener("click", function () {
      showToast("배포 승인이 기록되었습니다. (모의)");
    });
    document.getElementById("btnHold").addEventListener("click", function () {
      showToast("보류 상태를 유지합니다. (모의)");
    });
  }

  /* 토스트 */
  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2400);
  }

  renderTab1();
  renderTab2();
  renderTab3();
})();
</script>
</body>
</html>
